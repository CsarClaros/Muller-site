<div (click)="goToProduct()"
    class="group cursor-pointer bg-white rounded-lg overflow-hidden border border-gray-200 hover:shadow-xl transition-all duration-300 hover:-translate-y-1">
    <div class="aspect-[4/3] overflow-hidden bg-gray-100">
        <img [src]="image" [alt]="name" (error)="handleImageError($event)"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
    </div>
    <div class="p-5">
        <div class="text-xs font-semibold text-[#16a34a] uppercase tracking-wide mb-2">
            {{ category }}
        </div>
        <h3 class="font-semibold text-lg text-gray-900 mb-2 group-hover:text-[#DC2626] transition-colors">
            {{ name }}
        </h3>
        <p class="text-sm text-gray-600 mb-4 line-clamp-2">
            {{ description }}
        </p>
        @if (price) {
        <div class="text-xl font-bold text-[#DC2626] mb-4">
            {{ price }}
        </div>
        }
        <div class="flex items-center text-[#DC2626] text-sm font-semibold group-hover:gap-2 transition-all">
            <span>View Details</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="ml-1 group-hover:translate-x-1 transition-transform"
                width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </div>
    </div>
</div>
